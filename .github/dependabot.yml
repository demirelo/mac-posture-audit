# Dependabot config — keeps GitHub Actions pinned-by-SHA references current.
# This repo has no language package manifests (it's a single-file shell
# script + opt-in Python companion with stdlib only), so only the
# github-actions ecosystem is enrolled here.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
