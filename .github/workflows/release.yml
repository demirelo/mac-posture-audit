name: Release

# Build, sign, and attach release assets when a v* tag is pushed.
#
# Signing uses Sigstore-cosign keyless OIDC — the signature is bound to the
# workflow's OIDC identity (this repo, this ref, this commit), and anyone can
# verify the asset came from this release workflow without trusting a stored
# private key. Pairs with (does not replace) the SSH-signed git tag.
#
# A workflow_dispatch trigger is included so existing releases can be
# back-filled with signed assets (call the workflow with the tag name, e.g.
# v1.6.0). All actions are pinned to commit SHAs; Dependabot keeps them current.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build + sign assets for (e.g. v1.6.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Build, sign, and attach release assets
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload assets to the release.
      contents: write
      # Needed for cosign keyless OIDC signing.
      id-token: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"

      - name: Check out tagged code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 1
          persist-credentials: false

      - name: Build release tarball
        id: build
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          dist="mac-posture-audit-${tag}"
          mkdir -p "$dist"
          # Ship the canonical user-facing layout: script + docs + companion tool.
          cp mac-posture-audit.sh README.md LICENSE SECURITY.md CHANGELOG.md "$dist/"
          [ -d docs ] && cp -R docs "$dist/"
          [ -d tools ] && cp -R tools "$dist/"
          [ -d scripts ] && cp -R scripts "$dist/"
          tar -czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" | tee "${dist}.tar.gz.sha256"
          echo "asset=${dist}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign tarball (sigstore keyless)
        run: |
          set -euo pipefail
          asset="${{ steps.build.outputs.asset }}"
          cosign sign-blob --yes \
            --output-signature "${asset}.sig" \
            --output-certificate "${asset}.pem" \
            "${asset}"
          echo "signed: ${asset}"
          echo "signature: ${asset}.sig"
          echo "certificate: ${asset}.pem"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          asset="${{ steps.build.outputs.asset }}"
          gh release upload "$tag" \
            "${asset}" \
            "${asset}.sha256" \
            "${asset}.sig" \
            "${asset}.pem" \
            --clobber
